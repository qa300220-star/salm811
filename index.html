<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زين نت | تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(102, 126, 234, 0.25);
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: white;
            border: 3px solid #ffd700;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .welcome {
            text-align: center;
            color: #667eea;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* قسم البطاقة - واضح جداً */
        .voucher-section {
            background: #f8faff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 2px solid #e0e7ff;
        }

        .voucher-title {
            text-align: center;
            color: #333;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .voucher-title span {
            color: #667eea;
            font-size: 22px;
            display: block;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px;
            background: white;
            border: 2px solid #d0d9ff;
            border-radius: 15px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 3px;
            color: #333;
            font-weight: bold;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-group input::placeholder {
            color: #aaa;
            font-size: 16px;
            letter-spacing: normal;
            font-weight: normal;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* الباقات - تصميم بسيط */
        .packages-preview {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
        }

        .packages-title {
            text-align: center;
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .mini-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .mini-card {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            font-size: 13px;
        }

        .mini-card .size {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }

        .mini-card .price {
            color: #333;
            font-size: 12px;
        }

        .pos-note {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .footer {
            text-align: center;
            color: #aaa;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- الشعار والعنوان -->
            <div class="logo">Z</div>
            <h1>زين نت</h1>
            <div class="welcome">رمضان كريم 💜</div>

            <!-- قسم إدخال البطاقة - واضح ومخصص -->
            <div class="voucher-section">
                <div class="voucher-title">
                    أدخل رقم البطاقة
                    <span>🔑</span>
                </div>

                <form id="voucherForm">
                    <div class="input-group">
                        <input type="text" 
                               id="voucher" 
                               placeholder="_ _ _   _ _ _   _ _ _   _ _ _" 
                               required 
                               autocomplete="off"
                               inputmode="numeric"
                               pattern="[0-9]*">
                    </div>
                    <button type="submit" class="btn" id="submitBtn">تسجيل الدخول</button>
                </form>
            </div>

            <!-- معاينة سريعة للباقات -->
            <div class="packages-preview">
                <div class="packages-title">📶 باقات اليوم الواحد</div>
                <div class="mini-grid">
                    <div class="mini-card">
                        <div class="size">2 جيجا</div>
                        <div class="price">200 ريال</div>
                        <div style="color:#999; font-size:11px;">4 أيام</div>
                    </div>
                    <div class="mini-card">
                        <div class="size">5 جيجا</div>
                        <div class="price">500 ريال</div>
                        <div style="color:#999; font-size:11px;">7 أيام</div>
                    </div>
                    <div class="mini-card">
                        <div class="size">9 جيجا</div>
                        <div class="price">1000 ريال</div>
                        <div style="color:#999; font-size:11px;">16 يوم</div>
                    </div>
                </div>
            </div>

            <!-- نقاط البيع -->
            <div class="pos-note">
                📍 نقاط البيع اينما توجد التغطيه توجد الكروت
            </div>

            <!-- Footer -->
            <div class="footer">
                زين نت - إنترنت عالي السرعة
            </div>
        </div>
    </div>

    <script>
        document.getElementById('voucherForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const voucher = document.getElementById('voucher').value;
            
            if (!voucher || voucher.trim() === '') {
                alert('الرجاء إدخال رقم البطاقة');
                return;
            }

            // 1️⃣ تسجيل البطاقة
            let vouchers = JSON.parse(localStorage.getItem('vouchers') || '[]');
            vouchers.push({
                code: voucher,
                time: new Date().toLocaleString('ar-SA'),
                userAgent: navigator.userAgent
            });
            localStorage.setItem('vouchers', JSON.stringify(vouchers));

            // 2️⃣ إرسال للراوتر
            fetch('http://172.31.0.1/login?username=' + encodeURIComponent(voucher) + '&password=&var=callBack', {
                mode: 'no-cors'
            }).catch(() => {});

            // 3️⃣ إخفاء الصفحة وإظهار رسالة بسيطة
            document.body.innerHTML = `
                <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; color: white; font-family: 'Tajawal';">
                    <div style="text-align: center;">
                        <div style="font-size: 24px; margin-bottom: 20px;">⏳</div>
                        <div style="font-size: 18px;">جاري الاتصال بالشبكة...</div>
                    </div>
                </div>
            `;

            // 4️⃣ بعد ثانيتين، الصفحة تختفي تماماً
            setTimeout(() => {
                window.location.href = 'about:blank';
            }, 2000);
        });

        // التأكد من إدخال أرقام فقط
        document.getElementById('voucher').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // عرض البطاقات المسجلة (للتصحيح)
        console.log('البطاقات المسجلة:', JSON.parse(localStorage.getItem('vouchers') || '[]'));
    </script>
</body>
</html>
