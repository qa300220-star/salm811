<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زين نت | دخول فوري</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Almarai', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a1928, #0d2a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .logo {
            width: 120px;
            margin: 0 auto 15px;
            display: block;
        }
        h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .sub {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #ff3366, #ff6680);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .small-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .footer {
            color: #aaa;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 18px;
        }
        .phones {
            direction: ltr;
            color: #ffd700;
            margin-top: 5px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4caf50;
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="https://i.ibb.co/fYW59ZDn/logo.png" class="logo" alt="زين نت">
            <h1>شبكة زين -نت اللاسلكيه</h1>
            <div class="sub">ترحب بكم وتتمنى لكم وقتاً ممتعاً</div>

            <input type="text" id="voucher" placeholder="ادخل رمز البطاقة هنا" value="admin">
            <button id="loginBtn">تسجيل الدخول</button>

            <div class="buttons">
                <div class="small-btn">الاسعار</div>
                <div class="small-btn">نقاط البيع</div>
            </div>

            <div class="footer">
                للشكاوي والاستفسار:<br>
                <span class="phones">714213159 - 737712692 - 778038918</span>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast">✅ جاري الاتصال...</div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const voucherInput = document.getElementById('voucher');
        const toast = document.getElementById('toastMsg');

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        loginBtn.addEventListener('click', function() {
            let voucher = voucherInput.value.trim();
            if (voucher === '') voucher = 'admin';
            
            // الطريقة الصحيحة: فتح الرابط مباشرة
            const url = `http://172.31.0.1/login?username=${encodeURIComponent(voucher)}&password=`;
            
            showToast('✅ جاري الاتصال بالشبكة...');
            
            // افتح الرابط في نفس الصفحة
            window.location.href = url;
        });

        voucherInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
