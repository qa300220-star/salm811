<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زين نت | دخول فوري</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Almarai', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a1928, #0d2a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .logo {
            width: 120px;
            margin: 0 auto 15px;
            display: block;
        }
        h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .sub {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .login-link {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff3366, #ff6680);
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            border: none;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .small-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .footer {
            color: #aaa;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 18px;
        }
        .phones {
            direction: ltr;
            color: #ffd700;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="https://i.ibb.co/fYW59ZDn/logo.png" class="logo" alt="زين نت">
            <h1>شبكة زين -نت اللاسلكيه</h1>
            <div class="sub">ترحب بكم وتتمنى لكم وقتاً ممتعاً</div>

            <input type="text" id="voucher" placeholder="ادخل رمز البطاقة هنا" value="admin">
            
            <!-- الرابط المباشر -->
            <a href="#" id="loginLink" class="login-link">تسجيل الدخول</a>

            <div class="buttons">
                <a href="#" class="small-btn">الاسعار</a>
                <a href="#" class="small-btn">نقاط البيع</a>
            </div>

            <div class="footer">
                للشكاوي والاستفسار:<br>
                <span class="phones">714213159 - 737712692 - 778038918</span>
            </div>
        </div>
    </div>

    <script>
        const loginLink = document.getElementById('loginLink');
        const voucherInput = document.getElementById('voucher');

        loginLink.addEventListener('click', function(e) {
            e.preventDefault();
            let voucher = voucherInput.value.trim();
            if (voucher === '') voucher = 'admin';
            
            // الرابط المباشر
            window.location.href = 'http://172.31.0.1/login?username=' + encodeURIComponent(voucher) + '&password=';
        });
    </script>
</body>
</html>
