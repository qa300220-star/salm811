<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#091527">
    <title>زين نت | الدخول السريع</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap');
        *, :after, :before {
            font-family: 'Almarai', sans-serif, Arial;
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        body, html {
            font-size: 80.5%;
            height: 100%;
            font-family: 'Almarai', sans-serif, Arial;
            direction: rtl
        }
        @media (max-width: 768px) {
            body, html { font-size: 65% }
        }
        button, input {
            outline: 0;
            border: none
        }
        .cont {
            position: relative;
            height: 100%;
            background: linear-gradient(135deg, #0a1928, #0d2a3a);
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .demo {
            position: relative;
            width: 30rem;
            height: auto;
            margin: 2rem auto;
            border-radius: 20px;
        }
        .login {
            position: relative;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .logo {
            max-width: 200px;
            display: block;
            margin: 0 auto 20px auto;
        }
        .info {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .login-form {
            text-align: center;
            padding: 1.5rem 1rem;
        }
        .login-row {
            height: 5rem;
            padding-top: 1rem;
            border-bottom: 1px solid rgba(255,215,0,0.5);
            margin-bottom: 20px;
        }
        .login-input {
            direction: ltr;
            display: inline-block;
            text-align: center;
            width: 100%;
            height: 100%;
            padding: 0 1rem;
            font-size: 1.5rem;
            background: 0 0;
            color: #fff;
        }
        .login-input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .login-submit {
            width: 100%;
            height: 4rem;
            margin: 2rem 0 1rem;
            color: white;
            background: linear-gradient(135deg, #ff3366, #ff6680);
            font-size: 1.5rem;
            border-radius: 3rem;
            cursor: pointer;
        }
        .contact {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
        }
        .contact a {
            color: #ffaa66;
            text-decoration: none;
        }
        .round-button {
            width: 6rem;
            height: 6rem;
            font-size: 14px;
            border-radius: 200px;
            margin: 0 3px;
            background: rgba(255,51,102,0.8);
            color: white;
            cursor: pointer;
            border: none;
        }
        .buttons-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .bottom-info {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            font-size: 11px;
        }
        .success-msg, .error-msg {
            background: rgba(76, 175, 80, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            display: none;
        }
        .success-msg { border: 1px solid #4caf50; color: #4caf50; }
        .error-msg { border: 1px solid #ff4444; color: #ff8888; }
        .success-msg.show, .error-msg.show { display: block; }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body>
    <div class="cont">
        <div class="demo">
            <div class="login">
                <div style="text-align: center;">
                    <img src="https://i.ibb.co/fYW59ZDn/logo.png" class="logo" alt="زين نت" onerror="this.style.display='none'">
                </div>
                <p class="info" style="font-size: 2rem; font-weight: bold; color:#ffd700;">شبكة زين -نت اللاسلكيه</p>
                <p class="info" style="font-size: 1.2rem;">ترحب بكم وتتمنى لكم وقتاً ممتعاً</p>
                <p class="info" style="font-size: 1rem;">
                    <span class="status-dot"></span> الشبكة متاحة
                </p>
                
                <div class="login-form">
                    <div class="login-row">
                        <input type="text" class="login-input" id="voucherCode" placeholder="ادخل رمز البطاقة هنا" autocomplete="off">
                    </div>
                    <button class="login-submit" id="connectBtn">
                        تسجيل الدخول
                    </button>
                    
                    <div id="successMsg" class="success-msg">✅ تم توصيل الإنترنت بنجاح</div>
                    <div id="errorMsg" class="error-msg">⚠️ أنت غير متصل بشبكة زين نت! يرجى الاتصال بالشبكة أولاً.</div>
                </div>
                
                <div class="buttons-group">
                    <button class="round-button" id="priceBtn">الاسعار</button>
                    <button class="round-button" id="sellBtn">نقاط البيع</button>
                </div>
                
                <div class="contact">
                    للشكاوي والاستفسار:<br>
                    <a href="tel:778038918">778038918</a> - <a href="tel:737712692">737712692</a> - <a href="tel:714213159">714213159</a>
                </div>
                
                <div class="bottom-info">
                    Developed &amp; Powered By
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const connectBtn = document.getElementById('connectBtn');
        const voucherInput = document.getElementById('voucherCode');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const priceBtn = document.getElementById('priceBtn');
        const sellBtn = document.getElementById('sellBtn');
        
        // دالة لاختبار الاتصال بالراوتر
        function testConnection() {
            return fetch('http://172.31.0.1/status?var=callBack', { mode: 'no-cors' })
                .then(() => true)
                .catch(() => false);
        }
        
        connectBtn.addEventListener('click', async function() {
            let voucher = voucherInput.value.trim();
            if (voucher === '') voucher = 'admin';
            
            // إخفاء الرسائل السابقة
            successMsg.classList.remove('show');
            errorMsg.classList.remove('show');
            
            // اختبار الاتصال بالشبكة
            const isConnected = await testConnection();
            
            if (isConnected) {
                // إذا كان متصلاً، يرسل الطلب
                window.location.href = 'http://172.31.0.1/login?username=' + encodeURIComponent(voucher) + '&password=';
                successMsg.classList.add('show');
                setTimeout(() => successMsg.classList.remove('show'), 3000);
            } else {
                // إذا غير متصل، يعرض رسالة
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 4000);
            }
        });
        
        voucherInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') connectBtn.click();
        });
        
        priceBtn.addEventListener('click', () => alert('📊 صفحة الأسعار قيد التطوير'));
        sellBtn.addEventListener('click', () => alert('📍 نقاط البيع قيد التطوير'));
    </script>
</body>
</html>
