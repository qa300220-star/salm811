<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#091527">
    <title>زين نت | الدخول السريع</title>
    <style>
        /* ===== CSS الأصلي من الشبكة ===== */
        @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap');
        *, :after, :before {
            font-family: 'Almarai', sans-serif, Arial;
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        body, html {
            font-size: 80.5%;
            height: 100%;
            font-family: 'Almarai', sans-serif, Arial;
            direction: rtl
        }
        @media (max-width: 768px) {
            body, html { font-size: 65% }
        }
        svg {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            overflow: visible
        }
        .svg-icon { cursor: pointer }
        .svg-icon path {
            stroke: rgba(255, 255, 255, .9);
            fill: none;
            stroke-width: 1
        }
        button, input {
            outline: 0;
            border: none
        }
        .cont {
            position: relative;
            height: 100%;
            background-color: #143C5E;
            background: linear-gradient(135deg, hsl(216, 64.1%, 7.6%) 0, hsl(216deg 67% 20% / 35%) 70%), linear-gradient(25deg, hsl(0, 0%, 0%) 10%, hsla(221.3, 34.8%, 27.1%, 0) 80%), linear-gradient(315deg, hsl(0deg 0% 100%) 15%, hsl(46deg 37% 84% / 9%) 80%), linear-gradient(245deg, hsl(216deg 80% 17%) 100%, hsl(271deg 51% 56% / 0%) 70%);
            background-size: cover;
            background-position: right;
            overflow: auto;
            font-family: 'Almarai', sans-serif, Arial;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .demo {
            position: relative;
            width: 30rem;
            height: auto;
            margin: 2rem auto;
            border-radius: 20px;
        }
        .login {
            position: relative;
            height: 100%;
            background: linear-gradient(to bottom, rgba(78, 95, 125, 0.61) 0, rgba(23, 57, 106, 0.56) 100%);
            border-radius: 20px;
            padding: 30px 20px;
        }
        .logo {
            max-width: 200px;
            display: block;
            margin: 0 auto 20px auto;
        }
        .info {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .login-form {
            text-align: center;
            padding: 1.5rem 1rem;
        }
        .login-row {
            height: 5rem;
            padding-top: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, .2);
            margin-bottom: 20px;
        }
        .login-input {
            direction: ltr;
            display: inline-block;
            text-align: center;
            width: 100%;
            height: 100%;
            padding: 0 1rem;
            font-size: 1.5rem;
            background: 0 0;
            color: #fdfcfd;
        }
        .login-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .login-submit {
            position: relative;
            width: 100%;
            height: 4rem;
            margin: 2rem 0 1rem;
            color: rgba(255, 255, 255, .8);
            background: #ff3366;
            font-size: 1.5rem;
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-submit:hover {
            background: #ff5555;
            transform: translateY(-2px);
        }
        .contact {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
        }
        .contact a {
            color: #ff6a6a;
            text-decoration: none;
        }
        .round-button {
            width: 6rem;
            height: 6rem;
            font-size: 14px;
            border-radius: 200px;
            margin: 0 3px;
            background: rgba(255,51,102,0.8);
            color: white;
            cursor: pointer;
            border: none;
        }
        .buttons-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .bottom-info {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            font-size: 11px;
        }
        .success-msg {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            color: #4caf50;
            font-size: 12px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body>
    <div class="cont">
        <div class="demo">
            <div class="login">
                <!-- الصورة من الرابط الجديد -->
                <div style="text-align: center;">
                    <img src="https://i.ibb.co/fYW59ZDn/logo.png" class="logo" alt="زين نت" onerror="this.style.display='none'">
                </div>
                <p class="info" style="font-size: 2rem; font-weight: bold;">شبكة زين -نت اللاسلكيه</p>
                <p class="info" style="font-size: 1.2rem;">ترحب بكم وتتمنى لكم وقتاً ممتعاً</p>
                <p class="info" style="font-size: 1rem;">
                    <span class="status-dot"></span> الشبكة متاحة
                </p>
                
                <div class="login-form">
                    <div class="login-row">
                        <input type="text" class="login-input" id="voucherCode" placeholder="ادخل رمز البطاقة هنا" autocomplete="off">
                    </div>
                    <button class="login-submit" id="connectBtn">
                        تسجيل الدخول
                    </button>
                    
                    <div id="successMsg" class="success-msg">
                        ✅ تم توصيل الإنترنت بنجاح
                    </div>
                </div>
                
                <div class="buttons-group">
                    <button class="round-button" id="priceBtn">الاسعار</button>
                    <button class="round-button" id="sellBtn">نقاط البيع</button>
                </div>
                
                <div class="contact">
                    للشكاوي والاستفسار:<br>
                    <a href="tel:778038918">778038918</a> - <a href="tel:737712692">737712692</a> - <a href="tel:714213159">714213159</a>
                </div>
                
                <div class="bottom-info">
                    Developed &amp; Powered By
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const connectBtn = document.getElementById('connectBtn');
        const voucherInput = document.getElementById('voucherCode');
        const successMsg = document.getElementById('successMsg');
        const priceBtn = document.getElementById('priceBtn');
        const sellBtn = document.getElementById('sellBtn');
        
        connectBtn.addEventListener('click', function() {
            let voucher = voucherInput.value.trim();
            if (voucher === '') {
                voucher = 'admin';
            }
            window.location.href = 'http://172.31.0.1/login?username=' + encodeURIComponent(voucher) + '&password=';
            successMsg.classList.add('show');
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 3000);
        });
        
        voucherInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                connectBtn.click();
            }
        });
        
        priceBtn.addEventListener('click', function() {
            alert('📊 صفحة الأسعار قيد التطوير');
        });
        
        sellBtn.addEventListener('click', function() {
            alert('📍 نقاط البيع قيد التطوير');
        });
    </script>
</body>
</html>
